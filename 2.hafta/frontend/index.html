<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCheck | 🌈 Modunu Tasarla</title>
    <style>
        :root {
            --primary-grad: linear-gradient(45deg, #ff007a, #7000ff, #00d4ff);
            --bg-dark: #0f172a;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 0, 122, 0.15) 0, transparent 50%), 
                radial-gradient(at 100% 0%, rgba(0, 212, 255, 0.15) 0, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #f1f5f9;
            overflow: hidden;
        }

        /* HAREKETLİ BALONCUKLAR SİSTEMİ */
        .bubbles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bubble { position: absolute; bottom: -100px; width: 40px; height: 40px; background: rgba(255, 255, 255, 0.1); border-radius: 50%; animation: rise 10s infinite ease-in; }
        .bubble:nth-child(1) { left: 10%; width: 80px; height: 80px; animation-duration: 8s; }
        .bubble:nth-child(2) { left: 20%; width: 30px; height: 30px; animation-duration: 12s; }
        .bubble:nth-child(3) { left: 35%; width: 50px; height: 50px; animation-duration: 10s; }
        .bubble:nth-child(4) { left: 50%; width: 25px; height: 25px; animation-duration: 14s; }
        .bubble:nth-child(5) { left: 65%; width: 60px; height: 60px; animation-duration: 11s; }
        @keyframes rise { 0% { bottom: -100px; opacity: 0; } 50% { opacity: 0.5; } 100% { bottom: 110vh; opacity: 0; } }

        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(25px);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        h1 { 
            background: var(--primary-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.8rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -2px;
        }

        .input-group { margin-top: 20px; text-align: left; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.85rem; color: #cbd5e1; }
        
        select {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 1rem;
            outline: none;
            background: rgba(15, 23, 42, 0.8);
            color: white;
            cursor: pointer;
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 18px;
            background: var(--primary-grad);
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(112,0,255,0.4); }

        #resultArea {
            margin-top: 25px;
            padding: 20px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.05);
            display: none; 
            border: 2px solid #7000ff;
            animation: fadeIn 0.5s;
        }

        .source-tag {
            font-size: 0.75rem;
            color: #00d4ff;
            font-weight: bold;
            display: block;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="bubbles">
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
    </div>

    <div class="card">
        <div style="font-size: 3rem; margin-bottom: 10px;">🌈</div>
        <h1>VibeCheck</h1>
        <p style="color: #94a3b8; font-weight: 600;">Modunu Seç, Sihri Başlat! ✨</p>

        <div class="input-group">
            <label>🎭 Modun?</label>
            <select id="moodSelect">
                <option value="uykusuz">🥱 Uykusuz</option>
                <option value="yorgun">😩 Yorgun</option>
                <option value="enerjik">⚡ Enerjik</option>
                <option value="heyecanli">🤩 Heyecanlı</option>
                <option value="stresli">🤯 Stresli</option>
                <option value="mutlu">😊 Mutlu</option>
                <option value="huzurlu">🧘 Huzurlu</option>
                <option value="kaygili">😰 Kaygılı</option>
                <option value="mutsuz">😔 Mutsuz</option>
                <option value="sinirli">🤬 Sinirli</option>
                <option value="yalniz">🏚 Yalnız</option>
                <option value="merakli">🧐 Meraklı</option>
                <option value="tembel">🦥 Tembel</option>
                <option value="romantik">💖 Romantik</option>
                <option value="ozguvenli">👑 Özgüvenli</option>
            </select>
        </div>

        <div class="input-group">
            <label>🕒 Vaktin?</label>
            <select id="timeSelect">
                <option value="30">⚡ 30 Dakika</option>
                <option value="60">🔋 1 Saat</option>
                <option value="120">🚀 2 Saat+</option>
            </select>
        </div>

        <button id="submitBtn" onclick="generateVibeFromAI()">Sihirli Öneriyi Al! 🔮</button>

        <div id="resultArea">
            <div id="resultText" style="font-weight: 700; color: #f8fafc; line-height: 1.6;"></div>
            <span id="sourceText" class="source-tag"></span>
        </div>
    </div>

<script>
    async function generateVibeFromAI() {
        const mood = document.getElementById('moodSelect').value;
        const time = document.getElementById('timeSelect').value;
        const resultArea = document.getElementById('resultArea');
        const resultText = document.getElementById('resultText');
        const sourceText = document.getElementById('sourceText');
        const submitBtn = document.getElementById('submitBtn');

        // Butonu yükleniyor moduna alalım
        submitBtn.innerText = "Yapay Zeka Düşünüyor... 🧠✨";
        submitBtn.disabled = true;

        // 🚀 GERÇEK CANLI BACKEND URL'İ (Buraya az önce çalışan Render linkini bağladık!)
        const BACKEND_URL = `https://vibecheck-ai-u7xr.onrender.com//api/vibe?mood=${mood}&time=${time}`;

        try {
            // Canlı backend sunucusuna istek atıyoruz
            const response = await fetch(BACKEND_URL);
            
            if (!response.ok) {
                throw new Error("Backend bağlantı hatası!");
            }

            const data = await response.json();
            
            // Gelen yanıtı ekrana basıyoruz
            resultText.innerHTML = `🌟 <b>${time} Dakikalık Reçeten:</b><br><br>${data.suggestion}`;
            sourceText.innerText = `⚙️ Motor: ${data.source}`;
            resultArea.style.display = 'block';

        } catch (error) {
            // Hata durumunda Fallback mekanizması
            resultText.innerHTML = `🤖 <b>Bağlantı Modu aktif:</b><br><br>Şu an sunucu çok yoğun görünüyor ama moral bozmak yok! Kendine güzel bir kahve yap ve <b>${time} dakika</b> boyunca en sevdiğin şarkıyı dinle! 🎵✨`;
            sourceText.innerText = "⚙️ Mod: Lokal Prototip Simülasyonu";
            resultArea.style.display = 'block';
        } finally {
            // Butonu eski haline döndür
            submitBtn.innerText = "Sihirli Öneriyi Al! 🔮";
            submitBtn.disabled = false;
        }
    }
</script>

</body>
</html>
