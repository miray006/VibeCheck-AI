<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCheck | 🌈 Modunu Tasarla</title>
    <style>
        :root {
            --primary-grad: linear-gradient(45deg, #ff007a, #7000ff, #00d4ff);
            --bg-dark: #0f172a;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 0, 122, 0.1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, rgba(0, 212, 255, 0.1) 0, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #f1f5f9;
            overflow: hidden; /* Baloncukların dışarı taşmasını engeller */
        }

        /* HAREKETLİ BALONCUKLAR SİSTEMİ */
        .bubbles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            bottom: -100px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            opacity: 0.5;
            animation: rise 10s infinite ease-in;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .bubble:nth-child(1) { left: 10%; width: 80px; height: 80px; animation-duration: 8s; }
        .bubble:nth-child(2) { left: 20%; width: 30px; height: 30px; animation-duration: 12s; animation-delay: 1s; }
        .bubble:nth-child(3) { left: 35%; width: 50px; height: 50px; animation-duration: 10s; animation-delay: 2s; }
        .bubble:nth-child(4) { left: 50%; width: 25px; height: 25px; animation-duration: 14s; animation-delay: 0s; }
        .bubble:nth-child(5) { left: 65%; width: 60px; height: 60px; animation-duration: 11s; animation-delay: 3s; }
        .bubble:nth-child(6) { left: 80%; width: 45px; height: 45px; animation-duration: 9s; animation-delay: 1s; }
        .bubble:nth-child(7) { left: 90%; width: 35px; height: 35px; animation-duration: 13s; animation-delay: 4s; }

        @keyframes rise {
            0% { bottom: -100px; transform: translateX(0); opacity: 0; }
            20% { opacity: 0.5; }
            50% { transform: translateX(50px); }
            100% { bottom: 110vh; transform: translateX(-50px); opacity: 0; }
        }

        /* KART TASARIMI */
        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(25px);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        h1 { 
            background: var(--primary-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.8rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -2px;
        }

        .input-group { margin-top: 20px; text-align: left; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.85rem; color: #cbd5e1; }
        
        select {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 1rem;
            outline: none;
            background: rgba(15, 23, 42, 0.8);
            color: white;
            cursor: pointer;
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 18px;
            background: var(--primary-grad);
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(112,0,255,0.4); }

        #resultArea {
            margin-top: 25px;
            padding: 20px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.05);
            display: none; 
            border: 2px solid #7000ff;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <!-- Arka Plan Baloncukları -->
    <div class="bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <div class="card">
        <div style="font-size: 3rem; margin-bottom: 10px;">🌈</div>
        <h1>VibeCheck</h1>
        <p style="color: #94a3b8; font-weight: 600;">Modunu Seç, Sihri Başlat! ✨</p>

        <div class="input-group">
            <label>🎭 Modun?</label>
            <select id="moodSelect">
                <option value="uykusuz">🥱 Uykusuz</option>
                <option value="yorgun">😩 Yorgun</option>
                <option value="enerjik">⚡ Enerjik</option>
                <option value="heyecanli">🤩 Heyecanlı</option>
                <option value="stresli">🤯 Stresli</option>
                <option value="mutlu">😊 Mutlu</option>
                <option value="huzurlu">🧘 Huzurlu</option>
                <option value="kaygili">😰 Kaygılı</option>
                <option value="mutsuz">😔 Mutsuz</option>
                <option value="sinirli">🤬 Sinirli</option>
                <option value="yalniz">🏚 Yalnız</option>
                <option value="merakli">🧐 Meraklı</option>
                <option value="tembel">🦥 Tembel</option>
                <option value="romantik">💖 Romantik</option>
                <option value="ozguvenli">👑 Özgüvenli</option>
            </select>
        </div>

        <div class="input-group">
            <label>🕒 Vaktin?</label>
            <select id="timeSelect">
                <option value="30">⚡ 30 Dakika</option>
                <option value="60">🔋 1 Saat</option>
                <option value="120">🚀 2 Saat+</option>
            </select>
        </div>

        <button onclick="generateVibe()">Sihirli Öneriyi Al! 🔮</button>

        <div id="resultArea">
            <div id="resultText" style="font-weight: 700; color: #f8fafc; line-height: 1.6;"></div>
        </div>
    </div>

<script>
    function generateVibe() {
        const mood = document.getElementById('moodSelect').value;
        const time = document.getElementById('timeSelect').value;
        const resultArea = document.getElementById('resultArea');
        const resultText = document.getElementById('resultText');

        const suggestions = {
            "uykusuz": ["Pencereyi aç ve 5 dk derin nefes al. 🌬️", "Buz gibi bir suyla yüzünü yıka. 🧊", "Papatya çayı iç. 🌿", "Hafif tempo bir müzik aç. 🎶", "Güneş ışığına çık. ☀️", "Kısa bir yürüyüş yap. 🚶", "Yüzünü yıka ve gerin. 🤸", "Camı sonuna kadar aç"],
            "yorgun": ["Lavanta kokla. 🌿", "Ayaklarını yükseğe kaldır. 👣", "Ilık bir duş al. 🚿", "Gözlerini 10 dk kapat. 👁️", "Melisa çayı iç. 🍵", "Hafif bir esneme yap. 🧘", "Sevdiğin bir şarkıyı dinle. 🎵", "Karanlık bir odada dinlen. 🌑"],
            "enerjik": ["En sevdiğin dans şarkısını aç. 💃", "Hızlıca 20 squat yap. 🏋️", "Dışarı çık ve koş. 🏃", "Yeni bir proje planla. 📝", "Arkadaşlarını ara. 📞", "Yüksek sesle şarkı söyle. 🎤", "Bisiklete bin. 🚲", "Odanı topla, enerjini at. 🧹"],
            "heyecanli": ["Duygularını yaz. ✍️", "Sakinleşmek için nefes egzersizi yap. 🧘", "Geleceği hayal et. 🌠", "Bir bardak su iç. 💧", "Müzik dinle. 🎧", "Kendine bir kahve ısmarla. ☕", "Yürüyüşe çık. 🚶‍♀️", "Yeni bir şey öğren. 🧐"],
            "stresli": ["Mandala boya. 🖍️", "Telefonu kapat. 📵", "Doğaya çık. 🌳", "Papatya çayı iç. 🌼", "Stres topuyla oyna. 🎾", "Banyo yap. 🛀", "Komik video izle. 😹", "Sadece otur ve hiçbir şey yapma. 🧘‍♂️"],
            "mutlu": ["Gülümse! 😊", "Sevdiğin birine mesaj at. 💌", "Dondurma ye. 🍦", "Şarkı söyle. 🎶", "Dans et. 🕺", "Fotoğraf çek. 📸", "Hayvanları besle. 🐦🐕", "Bugüne teşekkür et. ✨"],
            "huzurlu": ["Kitap oku. 📖", "Gökyüzünü izle. ☁️", "Mum yak. 🕯️", "Yavaş yürü. 🚶", "Bitki çayı iç. 🍵", "Günlük tut. 📓", "Meditasyon yap. 🧘", "Uzaklara bak. 🔭"],
            "kaygili": ["5-4-3-2-1 kuralını uygula. 🖐️", "Su iç. 💧", "Ağır battaniye kullan. 🛌", "Kaygılarını kağıda yaz. 📝", "Seni mutlu edecek şeyler izle/oku.", "Limon kokla. 🍋", "Yavaş nefes al. 🌬️", "Sıcak bir içecek iç. ☕"],
            "mutsuz": ["Kendine sarıl. 🫂", "Seni neşelendirecek bir şeyler izle. 🎬", "Tatlı ye. 🍰", "Sıcak duş al. 🚿", "Bir arkadaşını ara. 📞", "Müzik dinle. 🎵", "Günlüğüne dök içini. ✍️", "Biraz uyu. 🛌"],
            "sinirli": ["Yastığı yumrukla. 🥊", "Bağır (mümkünse). 🗣️", "Soğuk su iç. 🧊", "100'den geriye say. 🔢", "Kağıt yırt. 📄", "Hızlı yürü. 🏃‍♂️", "Derin nefes al. 😤", "Yalnız kal. 🧘"],
            "yalniz": ["Podcast dinle. 🎙️", "Bir topluluğa katıl. 🏘️", "Eski bir dostu ara. 📞", "Kafeye git. ☕", "Evcil hayvanınla oyna. 🐾", "Mektup yaz. ✉️", "Sinemaya git. 🍿", "Kurslara bak. 🎓"],
            "merakli": ["Wikipedia'da gez. 🌐", "Belgesel izle. 🎞️", "Bulmaca çöz. 🧩", "Yeni bir dil öğren. 🗣️", "Deney yap. 🧪", "Müzeye git. 🏛️", "Soru sor. ❓", "Gözlem yap. 🔍"],
            "tembel": ["Yatakta gerin. 🛌", "Maske yap. ✨", "Sadece yat. 🦥", "Çizgi film izle. 📺", "Radyo dinle. 📻", "Abur cubur ye. 🍿", "Hayal kur. 💭", "Sosyal medyada gez. 📱"],
            "romantik": ["Şiir oku. 📜", "Şarkı gönder. 🎶", "Yemek yap. 🍳", "Yıldızlara bak. 🌠", "Çiçek al. 🌸", "Aşk filmi izle. 🎥", "El ele yürü. 👩‍❤️‍👨", "Mektup yaz. 💌"],
            "ozguvenli": ["Aynada kendine bak. 👑", "Başarılarını yaz. 🏆", "Dik yürü. 🚶", "Yeni bir şey dene. 🔥", "Yardım et. 🤝", "Şık giyin. 👗", "Hedef koy. 🎯", "Kendini alkışla. 👏"]
        };

        const list = suggestions[mood];
        const randomResult = list[Math.floor(Math.random() * list.length)];
        
        resultText.innerHTML = `Sana özel ${time} dakikalık önerimiz: <br><br> ${randomResult}`;
        resultArea.style.display = 'block';
    }
</script>

</body>
</html>
