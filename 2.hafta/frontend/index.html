<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCheck | 🌈 Modunu Tasarla</title>
    <style>
        :root {
            --primary-grad: linear-gradient(45deg, #ff007a, #7000ff, #00d4ff);
            --bg-dark: #0f172a;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 0, 122, 0.15) 0, transparent 50%), 
                radial-gradient(at 100% 0%, rgba(0, 212, 255, 0.15) 0, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #f1f5f9;
            overflow: hidden;
        }

        .bubbles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bubble { position: absolute; bottom: -100px; width: 40px; height: 40px; background: rgba(255, 255, 255, 0.1); border-radius: 50%; animation: rise 10s infinite ease-in; }
        .bubble:nth-child(1) { left: 10%; width: 80px; height: 80px; animation-duration: 8s; }
        .bubble:nth-child(2) { left: 20%; width: 30px; height: 30px; animation-duration: 12s; }
        .bubble:nth-child(3) { left: 35%; width: 50px; height: 50px; animation-duration: 10s; }
        .bubble:nth-child(4) { left: 50%; width: 25px; height: 25px; animation-duration: 14s; }
        .bubble:nth-child(5) { left: 65%; width: 60px; height: 60px; animation-duration: 11s; }
        @keyframes rise { 0% { bottom: -100px; opacity: 0; } 50% { opacity: 0.5; } 100% { bottom: 110vh; opacity: 0; } }

        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 { background: var(--primary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.8rem; font-weight: 900; margin: 0; }
        
        .input-group { margin-top: 20px; text-align: left; }
        label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.85rem; color: #cbd5e1; }
        
        select { width: 100%; padding: 15px; border-radius: 20px; background: rgba(15, 23, 42, 0.8); color: white; border: 1px solid #475569; }

        button { width: 100%; margin-top: 25px; padding: 18px; background: var(--primary-grad); color: white; border: none; border-radius: 20px; font-weight: 800; cursor: pointer; }

        #resultArea { margin-top: 25px; padding: 20px; border-radius: 25px; background: rgba(255, 255, 255, 0.05); display: none; border: 2px solid #7000ff; }
        .result-text { font-size: 1.1rem; line-height: 1.6; font-weight: 600; color: #f8fafc; }
    </style>
</head>
<body>
    <div class="bubbles">
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
    </div>

    <div class="card">
        <div style="font-size: 3rem;">🌈</div>
        <h1>VibeCheck</h1>
        <p style="color: #94a3b8; font-weight: 600;">Modunu Seç, Sihri Başlat! ✨</p>

        <div class="input-group">
            <label>🎭 Modun?</label>
            <select id="moodSelect">
                <option value="uykusuz">🥱 Uykusuz</option>
                <option value="yorgun">😩 Yorgun</option>
                <option value="enerjik">⚡ Enerjik</option>
                <option value="heyecanli">🤩 Heyecanlı</option>
                <option value="stresli">🤯 Stresli</option>
                <option value="mutlu">😊 Mutlu</option>
                <option value="huzurlu">🧘 Huzurlu</option>
                <option value="kaygili">😰 Kaygılı</option>
                <option value="mutsuz">😔 Mutsuz</option>
                <option value="sinirli">🤬 Sinirli</option>
                <option value="yalniz">🏚 Yalnız</option>
                <option value="merakli">🧐 Meraklı</option>
                <option value="tembel">🦥 Tembel</option>
                <option value="romantik">💖 Romantik</option>
                <option value="ozguvenli">👑 Özgüvenli</option>
            </select>
        </div>

        <div class="input-group">
            <label>🕒 Vaktin?</label>
            <select id="timeSelect">
                <option value="30">⚡ 30 Dakika</option>
                <option value="60">🔋 1 Saat</option>
                <option value="120">🚀 2 Saat+</option>
            </select>
        </div>

        <button onclick="generateVibe()">Sihirli Öneriyi Al! 🔮</button>

        <div id="resultArea">
            <div id="resultText" class="result-text"></div>
        </div>
    </div>

    <script>
        function generateVibe() {
            const mood = document.getElementById('moodSelect').value;
            const time = document.getElementById('timeSelect').value;
            const resultText = document.getElementById('resultText');
            const suggestions = {
                "uykusuz": ["Yüzünü buzla yıka! 🧊", "Kısa bir şekerleme yap. 😴", "Temiz hava al. 💨"],
                "yorgun": ["Ilık bir duş al. 🚿", "Battaniye altına gir. 🛌", "Bitki çayı iç. 🍵"],
                "enerjik": ["Dans et! 💃", "Mahallede koş. 🏃", "Yeni bir şey planla. 📝"],
                "heyecanli": ["Duygularını yaz. ✍️", "Arkadaşına anlat. 🗣️", "Müzik dinle. 🎧"],
                "stresli": ["Nefes egzersizi yap. 🧘", "Telefonu kapat. 📵", "Mandal boya. 🖍️"],
                "mutlu": ["Gülümse! 😊", "Dondurma ye. 🍦", "Selfie çek. 📸"],
                "huzurlu": ["Kitap oku. 📖", "Gökyüzüne bak. ☁️", "Mum yak. 🕯️"],
                "kaygili": ["5-4-3-2-1 kuralı. 🖐️", "Su iç. 💧", "Video izle. 🐈"],
                "mutsuz": ["Kendine sarıl. 🫂", "Film izle. 🎬", "Bitter çikolata ye. 🍫"],
                "sinirli": ["Yastığa vur. 🥊", "Soğuk su iç. 🧊", "Sakinleş. 🧘"],
                "yalniz": ["Podcast dinle. 🎙️", "Birini ara. 📞", "Kafeye git. ☕"],
                "merakli": ["Wiki'de gez. 🌐", "Belgesel izle. 🎥", "Bulmaca çöz. 🧩"],
                "tembel": ["Gerin. 🦥", "Çizgi film izle. 📺", "Hiçbir şey yapma. 🧘"],
                "romantik": ["Şiir oku. 📜", "Çiçek al. 🌸", "Aşk filmi izle. 🎥"],
                "ozguvenli": ["Dik dur. 👑", "Başarılarını yaz. 🏆", "Yeni hedef koy. 🎯"]
            };
            const list = suggestions[mood];
            resultText.innerHTML = `Sana özel ${time} dk önerimiz:<br><br>${list[Math.floor(Math.random() * list.length)]}`;
            document.getElementById('resultArea').style.display = 'block';
        }
    </script>
</body>
</html>
    }
</script>

</body>
</html>
